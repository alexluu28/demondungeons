<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smt Roguelike</title>
  <style>
    /* Prevent default page margins and force full-viewport centering */
    body {
      margin: 0;
      padding: 0;
      background-color: #0b0b12;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: 'monospace', sans-serif;
    }

    /* --- 🖥️ THE UPGRADED MASTER CONTAINER ANCHOR --- */
    #game-wrapper {
      position: relative !important;
      width: 1024px !important;  /* Expanded from 800px */
      height: 768px !important;  /* Expanded from 600px */
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.8) !important;
      background-color: transparent !important;
      overflow: hidden !important;
    }

    /* Force canvas layer to map exactly to boundary dimensions */
    #game {
      display: block !important;
      width: 100% !important;
      height: 100% !important;
      background-color: transparent !important; /* Forces Excalibur to drop its internal fallback color layer */
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
    }

    /* --- PERSISTENT EXPLORATION HTML HUD --- */
    #exploration-html-hud {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 80%;
      max-width: 650px;   /* Expanded to leverage expanded width cleanly */
      background: rgba(15, 15, 25, 0.85);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border: 2px solid rgba(255, 255, 255, 0.12);
      border-radius: 6px;
      padding: 10px 20px;
      z-index: 999;       /* Layers safely above the engine canvas render track */
      box-sizing: border-box;
      color: #ffffff;
      pointer-events: none; /* Allows mouse clicks to pass straight through to the map */
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* Top metrics bar tracker for structural exploration counters */
    .hud-top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
    }

    .hud-stat-box {
      font-size: 13px;
      font-weight: bold;
      letter-spacing: 1px;
      background: rgba(0, 0, 0, 0.4);
      padding: 3px 10px;
      border-radius: 4px;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .hud-label {
      color: #00ffcc;
      margin-right: 4px;
    }

    .hud-bar-container {
      display: flex;
      align-items: center;
      gap: 15px;
      width: 100%;
    }

    .level-badge {
      font-weight: bold;
      color: #ffd700;
      background: rgba(255, 215, 0, 0.15);
      border: 1px solid #ffd700;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 13px;
      letter-spacing: 1px;
      white-space: nowrap;
    }

    .xp-bar-track {
      position: relative;
      flex-grow: 1;
      height: 20px;
      background: #111116;
      border: 1px solid #333344;
      border-radius: 4px;
      overflow: hidden;
    }

    /* Dynamic level scaling node */
    #xp-bar-fill {
      width: 0%; /* Manipulated via your Engine initialization logic */
      height: 100%;
      background: linear-gradient(90deg, #00b4d8, #00f5d4);
      box-shadow: 0 0 10px rgba(0, 245, 212, 0.5);
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #xp-bar-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 11px;
      font-weight: bold;
      color: #ffffff;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
      pointer-events: none;
    }

    /* --- BATTLE HTML HUD SYSTEM MIGRATION MATRIX --- */
    #battle-html-hud {
      position: absolute;
      top: 0;
      left: 0;
      width: 1024px; /* Scaled to match resolution */
      height: 768px; /* Scaled to match resolution */
      pointer-events: none; /* Let clicks pass down to Excalibur selectors */
      font-family: 'Courier New', Courier, monospace;
      color: #ffffff;
      box-sizing: border-box;
      z-index: 995;
    }

    /* Retro Combat Feed Container */
    #battle-log-container {
      position: absolute;
      top: 25px;
      left: 25px;
      width: 320px; /* Wider reading frame allocation */
      height: 220px; /* Taller output track */
      background: rgba(10, 15, 25, 0.88);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border: 2px solid #3a4b6e;
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      pointer-events: auto; /* Let scrollbars work smoothly */
    }

    .battle-log-header {
      background: #1c263b;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 1px;
      color: #00ffcc;
      border-bottom: 1px solid #3a4b6e;
    }

    #battle-log-feed {
      padding: 8px 10px;
      font-size: 12px;
      line-height: 1.4;
      overflow-y: auto;
      flex-grow: 1;
    }

    /* Combat Feed Colorization Modifiers */
    .log-entry-system { color: #8c9ba5; }
    .log-entry-player { color: #00ffcc; }
    .log-entry-enemy { color: #ff4a4a; }
    .log-entry-weak { color: #ffcc00; font-weight: bold; text-shadow: 0 0 4px rgba(255, 204, 0, 0.3); }

    /* Centered Enemy Grid Container */
    #battle-enemy-container {
      position: absolute;
      pointer-events: auto;
      z-index: 996;
    }

    /* Bottom Row Party Grid Deck Layout */
    #battle-party-row {
      position: absolute;
      bottom: 220px; /* Pushed up to clear expanded hand assets cleanly */
      left: 25px;
      width: 550px;  /* Offers comfortable spread space */
      display: flex;
      gap: 16px;
      pointer-events: auto;
    }

    .party-status-card {
      flex: 1;
      background: rgba(16, 22, 34, 0.92);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border: 2px solid #2d3954;
      padding: 10px;
      border-radius: 4px;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    /* Focus border state indicator for processing turns */
    .party-status-card.active-turn {
      border-color: #00ffcc;
      box-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
    }

    .card-hero-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      border-bottom: 1px solid rgba(45, 57, 84, 0.5);
      padding-bottom: 4px;
    }

    .card-sprite-slot {
      width: 28px;
      height: 28px;
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      image-rendering: pixelated;
    }

    .card-hero-name {
      font-weight: bold;
      font-size: 13px;
      color: #e1e7f0;
      letter-spacing: 0.5px;
    }

    /* Resource Bar Assemblies */
    .bar-row {
      margin-bottom: 6px;
      font-size: 11px;
    }

    .bar-label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 2px;
      font-weight: bold;
    }

    .bar-track {
      height: 6px;
      background: #111116;
      border: 1px solid #222230;
      border-radius: 3px;
      overflow: hidden;
    }

    .bar-fill-hp {
      height: 100%;
      background: linear-gradient(90deg, #ff3333, #ff5e5e);
      transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .bar-fill-mp {
      height: 100%;
      background: linear-gradient(90deg, #2980b9, #3498db);
      transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* 🃏 UPGRADED TIẾN LÊN SELECTION HAND STAGE ARCHITECTURE */
    .player-hand-wrapper {
      position: absolute;
      bottom: 25px; /* Locked nicely along base border footprint */
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      width: 95%;
      max-width: 960px; /* Maximizes card layout extension track */
      pointer-events: auto; /* Re-enable pointer events for selection choices */
    }

    #cards-in-hand-container {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      height: 140px; /* Ample physical clearance headroom */
      width: 100%;
    }

    .game-card {
      background: #10141d;
      border: 2px solid #3a4b6e;
      border-radius: 8px;
      width: 72px;  /* Upscaled card width */
      height: 110px; /* Upscaled card height */
      margin-left: -16px; /* Smooth physical card fanning overlap */
      transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275), border-color 0.2s, box-shadow 0.2s;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 8px;
      box-sizing: border-box;
      user-select: none;
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.6);
      font-family: monospace;
      font-size: 13px;
      font-weight: bold;
    }

    .game-card:first-child {
      margin-left: 0;
    }

    .game-card:hover {
      transform: translateY(-20px);
      border-color: #ffffff;
      z-index: 100;
    }

    /* Selected lift state rule */
    .game-card.selected {
      transform: translateY(-38px); /* Clear physical pullout indicator */
      border-color: #00ffcc;
      box-shadow: 0 0 16px rgba(0, 255, 204, 0.6);
      z-index: 101;
    }

    /* Card Suit Custom Colorizations */
    .card-suit-HEARTS, .card-suit-DIAMONDS { color: #ff4a5a; }
    .card-suit-SPADES, .card-suit-CLUBS { color: #ffffff; }

    .card-corner-top { align-self: flex-start; }
    .card-center-icon { align-self: center; font-size: 22px; margin-top: -2px; }
    .card-corner-bottom { align-self: flex-end; }

    /* Hand Actions Row Styling */
    .hand-controls {
      display: flex;
      gap: 16px;
    }

    .hand-controls button {
      background: #0f131c;
      color: #00ffcc;
      border: 2px solid #3a4b6e;
      padding: 8px 24px;
      font-family: monospace;
      font-weight: bold;
      font-size: 12px;
      cursor: pointer;
      border-radius: 4px;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }

    .hand-controls button:hover:not(:disabled) {
      border-color: #00ffcc;
      background: #162233;
      box-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
    }

    .hand-controls button:disabled {
      color: #444455;
      border-color: #222230;
      background: #080a0f;
      cursor: not-allowed;
    }

    /* --- THE INTERACTIVE LEVEL-UP OVERLAY SCREEN --- */
    #level-up-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 9999; /* Sits over everything inside the game-wrapper */
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: rgba(10, 10, 15, 0.94);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      transition: opacity 0.3s ease-in-out;
    }

    .draft-container {
      text-align: center;
      width: 100%;
    }

    .draft-headline {
      font-size: 32px;
      color: #ffd700;
      margin: 0 0 8px 0;
      text-shadow: 0 0 12px rgba(255, 215, 0, 0.4);
      letter-spacing: 2px;
    }

    .draft-subline {
      font-size: 15px;
      color: #aaaaaa;
      margin: 0 0 40px 0;
    }

    /* Grid alignment organizing level selections */
    #cards-row {
      display: flex;
      flex-direction: row;
      gap: 32px;
      justify-content: center;
      align-items: center;
      width: 100%;
      max-width: 900px; /* Expanded room footprint */
      margin: 0 auto;
    }

    .upgrade-card {
      background: linear-gradient(135deg, #1e1e2f, #12121a);
      border: 2px solid #444466;
      border-radius: 10px;
      width: 240px;
      padding: 24px;
      cursor: pointer;
      box-sizing: border-box;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 300px;
      text-align: left;
      font-family: 'monospace', sans-serif;
    }

    .upgrade-card:hover {
      transform: translateY(-10px);
      border-color: #ffd700;
      box-shadow: 0 12px 24px rgba(255, 215, 0, 0.25);
    }

    .card-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 14px;
      color: #ffffff;
    }

    .card-description {
      font-size: 13px;
      color: #cccccc;
      line-height: 1.5;
      flex-grow: 1;
    }

    .card-rarity {
      font-size: 11px;
      text-transform: uppercase;
      font-weight: bold;
      letter-spacing: 1px;
      margin-top: 18px;
      padding: 4px 10px;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.1);
      align-self: flex-start;
    }

    .rarity-common { color: #8888aa; }
    .rarity-rare { color: #3a86ff; text-shadow: 0 0 5px rgba(58, 134, 255, 0.4); }
    .rarity-epic { color: #ff006e; text-shadow: 0 0 5px rgba(255, 0, 110, 0.4); }
  </style>
</head>
<body>

<div id="game-wrapper">
  <canvas id="game"></canvas>

  <div id="exploration-html-hud">
    <div class="hud-top-bar">
      <div class="hud-stat-box"><span class="hud-label">STAGE:</span><span id="hud-floor-text">B1</span></div>
      <div class="hud-stat-box"><span class="hud-label">COINS:</span><span id="hud-coin-text">0</span></div>
    </div>
    <div class="hud-bar-container">
      <div class="level-badge">LVL <span id="hud-level-text">1</span></div>
      <div class="xp-bar-track">
        <div id="xp-bar-fill"></div>
        <span id="xp-bar-text">0 / 100 XP</span>
      </div>
    </div>
  </div>

  <div id="battle-html-hud" style="display: none;">
    <div id="battle-log-container">
      <div class="battle-log-header">COMBAT LOG</div>
      <div id="battle-log-feed"></div>
    </div>

    <div class="battle-turn-status" id="battle-turn-status" style="position: absolute; top: 25px; left: 370px; font-size: 24px; font-weight: bold; letter-spacing: 2px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); z-index: 996;"></div>

    <div id="battle-enemy-container"></div>
    <div id="battle-party-row"></div>

    <div class="player-hand-wrapper">
      <div id="cards-in-hand-container"></div>
      <div class="hand-controls">
        <button id="btn-play-hand" disabled>PLAY SELECTION</button>
        <button id="btn-pass-turn">PASS TURN</button>
      </div>
    </div>
  </div>

  <div id="level-up-overlay" style="display: none;">
    <div class="draft-container">
      <h2 class="draft-headline">✨ LEVEL UP! ✨</h2>
      <p class="draft-subline">Select an upgrade card to reinforce your party members</p>
      <div id="cards-row"></div>
    </div>
  </div>
</div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
